name: CI

on:
  push:
  pull_request:

jobs:
  worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Worker tests
        run: npm run test:worker

      - name: Run bot benchmark
        run: npm run bench:bots
